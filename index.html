<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KC7 Storm Query Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <div class="max-w-6xl mx-auto p-4 sm:p-6 lg:p-8">
        <!-- Header -->
        <header class="mb-8 border-b border-gray-800 pb-6">
            <h1 class="text-3xl font-extrabold text-blue-400 flex items-center gap-2">
                <i data-lucide="cloud-lightning"></i> KC7 Storm Query Guide
            </h1>
            <p class="text-gray-400 mt-2">Log, search, and copy working Storm statements for the "A Storm Is Brewing" investigation.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left: Add Query Form -->
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 h-fit">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2 text-gray-200">
                    <i data-lucide="plus-circle" class="text-blue-400"></i> Log New Query
                </h2>
                <form id="queryForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1">Title / Intent</label>
                        <input type="text" id="title" required placeholder="e.g., Hunt for malicious attachment" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1">Category</label>
                        <select id="category" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500">
                            <option value="Email">Email Hunting</option>
                            <option value="Web Traffic">Web Logs</option>
                            <option value="Domain/DNS">DNS/Telemetry</option>
                            <option value="Host/Server">Host Logs</option>
                            <option value="Threat Intel">Threat Intel</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1">Storm Query Syntax</label>
                        <textarea id="syntax" required rows="3" placeholder='inet:email:message:to="target@envolvelabs.com"' class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-mono text-emerald-400 font-mono focus:outline-none focus:border-blue-500"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1">Notes / Pivot Logic</label>
                        <textarea id="notes" rows="2" placeholder="What did this reveal? Next pivot step..." class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2 px-4 rounded-lg transition duration-200 flex items-center justify-center gap-2">
                        <i data-lucide="save" class="w-4 h-4"></i> Save Statement
                    </button>
                </form>
            </div>

            <!-- Right: Search & Saved Queries List -->
            <div class="lg:col-span-2 space-y-6">
                <!-- Filter Bar -->
                <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 flex flex-col sm:flex-row gap-4">
                    <div class="flex-1 relative">
                        <i data-lucide="search" class="absolute left-3 top-2.5 text-gray-500 w-5 h-5"></i>
                        <input type="text" id="searchBar" placeholder="Search keywords or titles..." class="w-full bg-gray-900 border border-gray-700 rounded-lg pl-10 pr-4 py-2 text-white focus:outline-none focus:border-blue-500">
                    </div>
                    <select id="filterCategory" class="bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500">
                        <option value="All">All Categories</option>
                        <option value="Email">Email</option>
                        <option value="Web Traffic">Web Logs</option>
                        <option value="Domain/DNS">DNS</option>
                        <option value="Host/Server">Host Logs</option>
                        <option value="Threat Intel">Intel</option>
                    </select>
                </div>

                <!-- Query List container -->
                <div id="queryList" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
        // Default Seed Data matching KC7 themes
        const defaultQueries = [
            { id: 1, title: 'Lift email recipients by domain', category: 'Email', syntax: 'inet:email:message:to*="@envolvelabs.com"', notes: 'Good baseline for identifying initial access phishing targets.' },
            { id: 2, title: 'Pivot from FQDN to DNS resolution', category: 'Domain/DNS', syntax: 'inet:fqdn=badguy.com -> inet:dns:lookahead', notes: 'Finds IP addresses tied to the infrastructure.' },
            { id: 3, title: 'Filter process tree execution by name', category: 'Host/Server', syntax: 'it:exec:proc:name="powershell.exe" +:args*="-nop -w hidden"', notes: 'Isolates obfuscated execution vectors.' }
        ];

        let queries = JSON.parse(localStorage.getItem('kc7_storm_queries')) || defaultQueries;

        function saveToStorage() {
            localStorage.setItem('kc7_storm_queries', JSON.stringify(queries));
        }

        function renderQueries() {
            const list = document.getElementById('queryList');
            const searchTerm = document.getElementById('searchBar').value.toLowerCase();
            const categoryFilter = document.getElementById('filterCategory').value;

            list.innerHTML = '';

            const filtered = queries.filter(q => {
                const matchesSearch = q.title.toLowerCase().includes(searchTerm) || q.notes.toLowerCase().includes(searchTerm) || q.syntax.toLowerCase().includes(searchTerm);
                const matchesCategory = categoryFilter === 'All' || q.category === categoryFilter;
                return matchesSearch && matchesCategory;
            });

            if(filtered.length === 0) {
                list.innerHTML = `<div class="text-center py-8 text-gray-500 border border-dashed border-gray-800 rounded-xl">No queries found matching the criteria.</div>`;
                return;
            }

            filtered.forEach(q => {
                const card = document.createElement('div');
                card.className = 'bg-gray-800 p-5 rounded-xl border border-gray-700 hover:border-gray-600 transition flex flex-col justify-between';
                card.innerHTML = `
                    <div class="mb-4">
                        <div class="flex justify-between items-start gap-2 mb-2">
                            <h3 class="text-lg font-bold text-gray-200">${q.title}</h3>
                            <span class="px-2.5 py-0.5 rounded-full text-xs font-semibold bg-gray-700 text-blue-300 border border-gray-600">${q.category}</span>
                        </div>
                        ${q.notes ? `<p class="text-sm text-gray-400 mb-3 italic">${q.notes}</p>` : ''}
                        <div class="relative bg-gray-950 p-3 rounded-lg border border-gray-800 group font-mono text-emerald-400 break-all pr-12 text-sm select-all">
                            ${q.syntax}
                            <button onclick="copyQuery(this, \`${btoa(q.syntax)}\`)" class="absolute right-2 top-2 p-1.5 rounded bg-gray-800 hover:bg-gray-700 text-gray-400 hover:text-white transition" title="Copy to Clipboard">
                                <i data-lucide="copy" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                    <div class="flex justify-end border-t border-gray-700/50 pt-3">
                        <button onclick="deleteQuery(${q.id})" class="text-xs text-red-400 hover:text-red-300 flex items-center gap-1 transition">
                            <i data-lucide="trash-2" class="w-3.5 h-3.5"></i> Delete
                        </button>
                    </div>
                `;
                list.appendChild(card);
            });
            lucide.createIcons();
        }

        // Add Query Form Handling
        document.getElementById('queryForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const newQuery = {
                id: Date.now(),
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                syntax: document.getElementById('syntax').value,
                notes: document.getElementById('notes').value
            };
            queries.unshift(newQuery);
            saveToStorage();
            renderQueries();
            this.reset();
        });

        // Copy Clipboard Helper via Base64 to bypass character escaping issues
        window.copyQuery = function(btn, encodedSyntax) {
            const syntax = atob(encodedSyntax);
            navigator.clipboard.writeText(syntax).then(() => {
                const icon = btn.querySelector('i');
                btn.classList.add('bg-emerald-900/50', 'text-emerald-400');
                btn.innerHTML = `<i data-lucide="check" class="w-4 h-4"></i>`;
                lucide.createIcons();
                setTimeout(() => {
                    btn.classList.remove('bg-emerald-900/50', 'text-emerald-400');
                    btn.innerHTML = `<i data-lucide="copy" class="w-4 h-4"></i>`;
                    lucide.createIcons();
                }, 1500);
            });
        }

        window.deleteQuery = function(id) {
            if(confirm('Remove this statement from your tracker?')) {
                queries = queries.filter(q => q.id !== id);
                saveToStorage();
                renderQueries();
            }
        }

        // Live filtering listeners
        document.getElementById('searchBar').addEventListener('input', renderQueries);
        document.getElementById('filterCategory').addEventListener('change', renderQueries);

        // Initial setup
        renderQueries();
    </script>
</body>
</html>
